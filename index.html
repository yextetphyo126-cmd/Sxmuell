<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Message</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #fce4ec;
            font-family: 'Pyidaungsu', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 500px;
        }

        img {
            width: 180px;
            border-radius: 15px;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        h2 {
            color: #4a4a4a;
            min-height: 60px; /* စာသားပြောင်းရင် လှုပ်မသွားအောင် */
        }

        .buttons {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            white-space: nowrap;
            z-index: 100;
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            white-space: nowrap;
        }

        .hidden {
            display: none;
        }

        /* ဖုန်းမှာကြည့်ရင် စာလုံးတွေမထပ်အောင် */
        @media (max-width: 600px) {
            #yesBtn { font-size: 16px; }
            #noBtn { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div id="first-page" class="container">
        <img id="mainGif" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpwaG55NjBvNTVreXJreXJreXJreXJreXJreXJreXJreXJreXJreSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" alt="cute penguin">
        <h2 id="question">ကိုကိုကိုယ် ချစ်လားဗျာ🙄💕</h2>
        
        <div class="buttons" id="btnContainer">
            <button id="yesBtn" onclick="celebrate()">ချစ်တယ်</button>
            <button id="noBtn" onclick="handleNoClick()">မချစ်ဘူး</button>
        </div>
    </div>

    <div id="second-page" class="container hidden">
        <img src="https://media1.giphy.com/media/v1.Y2lkPTZjMDliOTUyNW42YXQ0YndrZHp4MzR6Z3ozNGdzenkxaDJzbXU3MzRyMXkzM3B6ciZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/xTiTnMhJTwNHChdTZS/giphy.gif" alt="cute seal">
        <h2>ကလေးလေးးချစ်တယ်ဆိုတာ ကိုကိုသိတာပေါ့ဗျာ🤪💕</h2>
    </div>

    <script>
        let clickCount = 0;
        const noTexts = [
            "မချစ်နိုင်ဘူး",
            "သေချာလို့လားဗျာ?",
            "ပြန်စဉ်းစားပေးပါအုန်းနော်",
            "တကယ်ကြီး ငြင်းမှာလားဗျာ?",
            "စိတ်မကောင်းဖြစ်သွားမှာ",
            "မချစ်ဘူးဆို ငိုချလိုက်မှာ​ဗျာ",
            "နောက်တစ်ခါ ထပ်စဉ်းစားပေးပါလား​ဗျာ",
            "ချစ်ပါနော့်​ကလေးလေးး"
        ];

        function handleNoClick() {
            clickCount++;
            
            const yesBtn = document.getElementById('yesBtn');
            const noBtn = document.getElementById('noBtn');
            const questionText = document.getElementById('question');

            // ၁။ No ခလုတ်စာသားပြောင်းမယ် (Array ထဲက စာသားတွေကို အစဉ်လိုက်ပြမယ်)
            if (clickCount < noTexts.length) {
                noBtn.innerText = noTexts[clickCount];
            } else {
                noBtn.innerText = "နှိပ်လို့မရတော့ဘူးလေ!";
            }

            // ၂။ Yes ခလုတ်ကို ကြီးလာအောင်လုပ်မယ်
            let newSize = 18 + (clickCount * 15); // တစ်ခါနှိပ်တိုင်း ၁၅ pixel တိုးမယ်
            let newPaddingH = 15 + (clickCount * 8);
            let newPaddingW = 30 + (clickCount * 12);

            yesBtn.style.fontSize = newSize + "px";
            yesBtn.style.padding = `${newPaddingH}px ${newPaddingW}px`;

            // ၃။ No ခလုတ်ကို သေးသွားအောင်လုပ်မယ်
            let noFontSize = Math.max(16 - (clickCount * 2), 2); 
            noBtn.style.fontSize = noFontSize + "px";
            noBtn.style.opacity = Math.max(1 - (clickCount * 0.1), 0.1);

            // ၄။ အကြိမ်ရေ ၈ ကြိမ်ထက်ကျော်ရင် No ခလုတ်ကို လုံးဝဖျောက်လိုက်မယ်
            if (clickCount >= 8) {
                noBtn.style.display = "none";
                yesBtn.style.position = "fixed";
                yesBtn.style.top = "0";
                yesBtn.style.left = "0";
                yesBtn.style.width = "100vw";
                yesBtn.style.height = "100vh";
                yesBtn.innerText = "ချစ်တယ်";
            }
        }

        function celebrate() {
            document.getElementById('first-page').classList.add('hidden');
            document.getElementById('second-page').classList.remove('hidden');
        }
    </script>

</body>
</html>
